<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816"/>
      <stop offset="0.48" stop-color="#0B1026"/>
      <stop offset="1" stop-color="#090514"/>
    </linearGradient>
    <linearGradient id="stroke" x1="110" y1="50" x2="1090" y2="310" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#F43F5E"/>
    </linearGradient>
    <linearGradient id="title" x1="350" y1="0" x2="850" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="0.48" stop-color="#C4B5FD"/>
      <stop offset="1" stop-color="#FDA4AF"/>
    </linearGradient>
    <radialGradient id="glowA">
      <stop stop-color="#06B6D4" stop-opacity=".24"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB">
      <stop stop-color="#8B5CF6" stop-opacity=".24"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#A78BFA" stroke-opacity=".08"/>
    </pattern>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="softGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="frame">
      <rect x="20" y="20" width="1160" height="320" rx="24"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect x="20" y="20" width="1160" height="320" rx="24" fill="url(#bg)"/>
    <rect x="20" y="20" width="1160" height="320" fill="url(#grid)"/>

    <ellipse cx="180" cy="120" rx="280" ry="230" fill="url(#glowA)" filter="url(#blur)">
      <animate attributeName="cx" values="180;310;180" dur="8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="1030" cy="250" rx="300" ry="240" fill="url(#glowB)" filter="url(#blur)">
      <animate attributeName="cx" values="1030;900;1030" dur="9s" repeatCount="indefinite"/>
    </ellipse>

    <g opacity=".8">
      <path d="M70 75H220L245 100H335" stroke="#22D3EE" stroke-opacity=".45"/>
      <circle cx="70" cy="75" r="4" fill="#22D3EE">
        <animate attributeName="opacity" values=".3;1;.3" dur="2.2s" repeatCount="indefinite"/>
      </circle>
      <path d="M865 280H980L1005 255H1130" stroke="#F43F5E" stroke-opacity=".45"/>
      <circle cx="1130" cy="255" r="4" fill="#F43F5E">
        <animate attributeName="opacity" values="1;.3;1" dur="2.6s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
      <text x="70" y="52" fill="#67E8F9" font-size="11" letter-spacing="2">SYS://PROFILE_UPLINK</text>
      <text x="1130" y="52" fill="#FDA4AF" font-size="11" letter-spacing="2" text-anchor="end">STATUS: ONLINE</text>

      <text x="600" y="183" fill="url(#title)" font-size="76" font-weight="700" letter-spacing="10" text-anchor="middle" filter="url(#softGlow)">UNKN0TTED</text>
      <text x="600" y="224" fill="#CBD5E1" fill-opacity=".78" font-size="15" letter-spacing="5" text-anchor="middle">CRAFTING SOFTWARE FROM THE UNKNOWN</text>

      <g font-size="11" letter-spacing="1.5">
        <text x="70" y="312" fill="#64748B">LATENCY  12ms</text>
        <text x="600" y="312" fill="#A78BFA" text-anchor="middle">BUILD · SHIP · ITERATE</text>
        <text x="1130" y="312" fill="#64748B" text-anchor="end">SIGNAL  100%</text>
      </g>
    </g>

    <rect x="20" y="-50" width="1160" height="2" fill="url(#stroke)" opacity=".35">
      <animate attributeName="y" values="-20;380" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;.45;0" dur="5s" repeatCount="indefinite"/>
    </rect>

    <path d="M50 75V52C50 43.716 56.716 37 65 37H90M1150 75V52C1150 43.716 1143.28 37 1135 37H1110M50 285V308C50 316.284 56.716 323 65 323H90M1150 285V308C1150 316.284 1143.28 323 1135 323H1110" stroke="url(#stroke)" stroke-width="2"/>
  </g>

  <rect x="20.75" y="20.75" width="1158.5" height="318.5" rx="23.25" stroke="url(#stroke)" stroke-width="1.5" stroke-opacity=".72"/>
</svg>
